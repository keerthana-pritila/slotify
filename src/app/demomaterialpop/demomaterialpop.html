<h2 mat-dialog-title class="title">UPI Payment</h2>
<mat-dialog-content>
    <div class = "popUpContainer">
    <p>Scan the QR code to pay ₹{{data.amount}}</p>
    <qrcode
    [qrdata] = "data.paymentUrl"
    [width] = "256"
    [errorCorrectionLevel]="'M'">
  </qrcode>
  </div>
  <!-- sets the dimensions of the generated QR code square to 256 pixels wide by 256 pixels high. -->
   <!-- 'M' stands for Medium.It allows up to 15% of the QR code image to be damaged,
    covered, or poorly printed while remaining fully scannable by a smartphone camera. -->
</mat-dialog-content>
<mat-dialog-actions>
    <button mat-button mat-dialog-close>Close</button>
</mat-dialog-actions>
