<div class="rewardsCard">

        <button class="backbtn" routerLink="/dashboard">⬅️ Back to Dashboard</button>
        <h1>My Rewards</h1>
    </div>

    <div class="pointsCard">
        <h2>{{points}} Points</h2>
        <p>Available Reward Balance</p>
    </div>

    <div class="infoGrid">

        <div class="infoBox">
            <h3>🎁 Redeem Points</h3>

        </div>

        <div class="infoBox">
            <h3>🏅 Membership</h3>

        </div>

        <div class="infoBox">

        </div>

    </div>
