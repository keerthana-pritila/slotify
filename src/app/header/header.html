<div class="headContainer">
    <div class="topLeft">

        <ul class="menu">
            <h1 routerLink="/">Slotify</h1>
            <li class="menu-items"><a (click)="goHome()" routerLinkActive="active-link"
                    [routerLinkActiveOptions]="{ exact: true }">Home</a></li>
            <li class="menu-items"><a routerLink="/about" routerLinkActive="active-link">About Us </a></li>
            <li class="menu-items"><a routerLink="/achievements" routerLinkActive="active-link">Achievements </a></li>
            <li class="menu-items "><a (click)="openhelpPopUp()">Help </a></li>
            <!-- Use Spaces for Multiple Classes: class="menu-items dropdown" (2 classes) below -->
            <li class="menu-items dropdown">
                <a>Amenities </a>
                <ul class="dropdown-menu">
                    <li><span>✔</span> Parking</li>
                    <li><span>✔</span> Washroom</li>
                    <li><span>✔</span> First Aid</li>
                    <li><span>✔</span> Drinking Water</li>
                </ul>
            </li>

        </ul>
    </div>

    @if(router.url !== '/register' && router.url !== '/login') {

    <div class="topRight">
        @if(!isLoggedIn && !isAdminLoggedIn){
        <button type="button" class="topBtn-Style" routerLink="/register">Register </button>
        <button type="submit" class="topBtn-Style" routerLink="/login">login</button>
        }
        <!-- Logged out → buttons(register,login) visible
            Logged in → buttons(register,login) hidden  -->

        @if(isLoggedIn){
        <div class="profileDropdown">
            <!-- <button class="profileBtn">👤{{loggedInUsername}}▼</button> -->
            <button class="profileBtn" (click)="toggleProfileMenu()">{{loggedInUsername}}▼</button>

            @if(isProfileMenuOpen){
            <div class="profileMenu">
                <button (click)="openProfile();isProfileMenuOpen = false"> My Profile</button>
                <button routerLink="/bookSlot"> Book Slot</button>
                <button routerLink="/myBooking"> History</button>
                <!-- <button disabled> 📍{{selectedLocation}}</button> -->
                <div class = "seperateSection"> </div>
                    <button  class="logoutBtn" (click)="confirmLogout();isProfileMenuOpen = false"> Logout </button>
                    <!-- logged in → logout button visible
                     logged out → logout button hidden -->
               
            </div>
        }
        </div>
        }
    </div>
    }
</div>
