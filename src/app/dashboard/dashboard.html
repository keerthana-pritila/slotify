<div class="dashboard">
    <div class="dashboardCard">
        <div class="topPart">
            <div class="locationBox">
                <span>📍</span>
                <select [(ngModel)]="selectedLocation" (change)="saveLocation()">
                    <option value="Select Location" disabled> Select Location</option>
                    @for (location of locations; track location) {
                    <option [value]="location">{{location}}</option>
                    }
                </select>
            </div>
            <div class="actionBtns">
                <button class="profileBtn" (click)="myProfile()">👤 Profile</button>
            <!-- <button class="logoutBtn" (click)="logout()">Logout</button> -->
            </div>
        </div>
        <h1>Welcome {{username}}!</h1>
        <p class="subtitle"> Manage your sports bookings and reservations </p>
        <div class="subDashboard">
            <button class="dashbtn" routerLink="/bookSlot">Book Slot</button>
            <button class="dashbtn" routerLink="/myBooking">My Bookings</button>
            <button class="dashbtn" routerLink="/faq">FAQ</button>
        </div>
    </div>
</div>
