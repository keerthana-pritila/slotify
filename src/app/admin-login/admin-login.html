<div class="adminLoginCard">
    <h1>Admin Login</h1>
    <input type="email" placeholder="Enter Email" [(ngModel)]="email">
    <input type="password" placeholder="Enter Password" [(ngModel)]="password">
    <p class="forgotLink" (click)="forgotPassword()"> Forgot Password?</p>
    <button (click)="adminLogin()"> Login </button>
</div>
