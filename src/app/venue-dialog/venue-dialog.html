<div class="venueInfo">
    <p><strong>Available Locations</strong></p>
    @for(location of venue.locations; track location.place){
    <div class="locationCard">
        <span>{{location.place}}</span>
        <span>₹{{location.price}}/hr</span>
    </div>

    }
    <p> <strong>Status:</strong> {{venue.status}} </p>
</div>
<div class="actions">
    <button class="deleteBtn" (click)="deleteVenue()"> Delete</button>
    <button class="closeBtn" (click)="close()">Close</button>
</div>
