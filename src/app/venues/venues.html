<h2>Venue Management</h2>
<div class="venuesGrid">
    @for(venue of venues; track venue.id){
    <div class="flipCard" [class.flipped]="flippedCard === venue.id" (click)="flipCard(venue.id)">
        <div class="flipInner">
            <!-- FRONT SIDE -->
            <div class="venueCard front">
                <h3>{{venue.name}}</h3>

                <span class="status">
                    <span class="dot"
                         [class.green]="venue.status === 'Active'"
                        [class.red]="venue.status === 'Inactive'">
                    </span>
                    {{venue.status}}
                </span>
            </div>
            <!-- BACK SIDE -->
            <div class="venueCard back">
                <!-- <p>{{venue.location}}</p>
                <p>₹{{venue.price}} / hr</p>
                <button (click)="openVenue(venue); $event.stopPropagation()">View Details</button> -->
                <!-- Without $event.stopPropagation() -- after Click on view details --then Card flips back immediately -->

                <h4> {{venue.locations?.length}} Locations</h4>
                <p> Starting from ₹{{venue.locations?.[0]?.price}}/hr</p>
                <button (click) = "openVenue(venue); $event.stopPropagation()"> View Details </button>
                <!-- ?. is called optional chaining. -->
                 <!-- means If locations exists → show the value.
                If not → don't crash. -->
            </div>
        </div>
        </div>
        }
    </div>
