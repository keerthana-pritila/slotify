<h2>Venue Management</h2>
<div class="venuesGrid">
     @for(venue of venues; track venue.id) {
           <!-- Parent sends venue & This reaches child component:@Input() venue:any 
            Parent sends flip state  -->
         <app-venue-card
            [venue]="venue" 
            [flipped]="flippedCard === venue.id" 
            (flip)="flipCard($event)"
            (viewDetails)="openVenue($event)">
        </app-venue-card>
    }
