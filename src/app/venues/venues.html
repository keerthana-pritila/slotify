<h2>Venue Management</h2>
<div class="venuesGrid">
    @for(venue of venues; track venue.id){
    <div class="venueCard" (click)="openVenue(venue)">
        <h3>{{venue.name}}</h3>
        <p>{{venue.location}}</p>
        <p>₹{{venue.price}} / hr</p>
        <span>{{venue.status}}</span>
    </div>
    }
</div>
