<h2 mat-dialog-title>Logout</h2>

<mat-dialog-content>
    Do you want to logout from Slotify?
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button [mat-dialog-close]="false">
        Cancel
    </button>

    <button mat-button [mat-dialog-close]="true">
        Logout
    </button>
</mat-dialog-actions>
